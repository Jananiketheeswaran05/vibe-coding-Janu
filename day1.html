<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Head section -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>

    <!-- CSS styling section -->
    <style>
        /* Import a modern font from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            /* gradient background */
            background: linear-gradient(135deg, #74ABE2 0%, #5563DE 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* profile card container */
        .card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            width: 300px;
            padding: 20px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #777;
            font-size: 14px;
        }

        .name {
            font-size: 1.5em;
            margin: 10px 0 5px;
            font-weight: 600;
        }

        .stream {
            font-size: 1em;
            color: #555;
            margin-bottom: 15px;
        }

        .bio {
            font-size: 0.95em;
            color: #666;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <!-- div structure used for the profile card -->
    <div class="card">
        <div class="profile-img">Image</div>
        <div class="name">John Doe</div>
        <div class="stream">Information Technology</div>
        <div class="bio">John is a dedicated IT student with a passion for coding and problem-solving. He enjoys working on web development projects and learning new technologies.</div>
    </div>
</body>
</html>
