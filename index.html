<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner & Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">StudyApp</div>
        <ul class="nav-links">
            <li><a href="#gpa">GPA Calculator</a></li>
            <li><a href="#timer" class="active">Study Timer</a></li>
        </ul>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <h3>Upcoming Events</h3>
            <ul id="events-list">
                <li>Exam: Math - March 15</li>
                <li>Assignment: CS - March 20</li>
                <li>Project: History - March 25</li>
            </ul>
        </aside>

        <main class="dashboard">
            <section id="timer" class="pomodoro-section">
                <h2>Pomodoro Timer</h2>
                <div class="timer-display">
                    <span id="minutes">25</span>:<span id="seconds">00</span>
                </div>
                <div class="timer-controls">
                    <button id="start-btn">Start</button>
                    <button id="reset-btn">Reset</button>
                </div>
            </section>

            <section id="gpa" class="gpa-section" style="display: none;">
                <h2>GPA Calculator</h2>
                <p>Coming soon...</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
